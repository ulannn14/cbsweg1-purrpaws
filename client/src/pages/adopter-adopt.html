<div class="app-layout has-filter">

    <main class="main">
    
    <!-- ACCESS ORGANIZATIONS FROM DB HERE -->
    <section class="section organizations">
        <div class="org-carousel">
            <div class="org-icon"></div>
            <div class="org-icon"></div>
            <div class="org-icon"></div>
            <div class="org-icon"></div>
        </div>
    </section>

    <section class="section adopt-grid">

    <!-- ACCESS ADOPT CARDS FROM DB HERE -->
    <div class="adopt-card">
        <div class="pet-photo">PICTURE</div>
        <div class="pet-info">
        <h3>NAME</h3>
        <p>Breed</p>
        <div class="tags">
            <span class="tag">vaccinated</span>
            <span class="tag dark">neutered</span>
        </div>
        </div>
    </div>

    <div class="adopt-card">
        <div class="pet-photo">PICTURE</div>
        <div class="pet-info">
        <h3>NAME</h3>
        <p>Breed</p>
        <div class="tags">
            <span class="tag">vaccinated</span>
            <span class="tag dark">neutered</span>
        </div>
        </div>
    </div>

    <div class="adopt-card">
        <div class="pet-photo">PICTURE</div>
        <div class="pet-info">
        <h3>NAME</h3>
        <p>Breed</p>
        <div class="tags">
            <span class="tag">vaccinated</span>
            <span class="tag dark">neutered</span>
        </div>
        </div>
    </div>

    </section>
    </main>

    <aside class="filter-bar">
        <h3>FILTER</h3>
        <form class="filter-form">

        <!-- Location Filter -->
        <div class="filter-group">
        <label for="location">Location</label>
        <input 
            type="text" 
            id="location" 
            name="location" 
            placeholder="Enter city or ZIP code"
        >
        </div>

        <!-- Age Range Filter -->
        <div class="filter-group">
        <label>Age Range</label>
        <div class="age-range">
            <input 
            type="number" 
            id="age-min" 
            name="age_min" 
            placeholder="Min" 
            min="0"
            >
            <span class="age-separator">-</span>
            <input 
            type="number" 
            id="age-max" 
            name="age_max" 
            placeholder="Max" 
            min="0"
            >
        </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="filter-btn">Apply Filters</button>

    </form>
    </aside>

</div>

<div class="app-layout">
  <main class="main">

    <!-- Campaigns -->
    <section class="section campaigns">
      <h2>CAMPAIGNS</h2>

      <div class="carousel-wrapper">

        <button class="carousel-btn prev">❮</button>

        <div class="carousel"> <!-- ACCESS CAMPAIGN BANNERS FROM DB HERE -->
          <div class="campaign-card">
            <img src="/images/campaign.jpg" alt="Campaign Banner">
          </div>
        </div>

        <button class="carousel-btn next">❯</button>

      </div>

      <div class="carousel-dots"></div>
    </section>

    <!-- Adopt Here -->
    <section class="section adopt">
      <div class="section-header">
        <h2>ADOPT HERE</h2>
        <a href="/adopt" data-link>
          <button class="arrow-btn">❯</button>
        </a>
      </div>

      <div class="adopt-card">  <!-- ACCESS PET INFOS FROM DB HERE -->
        <div class="pet-photo">PICTURE</div>
        <div class="pet-info">
          <h3>NAME</h3>
          <p>Breed</p>
          <div class="tags">
            <span class="tag">vaccinated</span>
            <span class="tag dark">neutered</span>
          </div>
        </div>
      </div>
    </section>

    <!-- More Info / ASEAN -->
    <section class="section more-info">
      <div class="section-header">
        <h2>MORE INFO</h2>
        <button class="arrow-btn">❯</button>
      </div>

      <div class="asean-text">
      </div>
    </section>

  </main>

</div>

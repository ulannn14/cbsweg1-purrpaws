<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f0f0" stroke="#ddd" stroke-width="2"/>
  
  <!-- Head -->
  <ellipse cx="100" cy="90" rx="45" ry="50" fill="#ff9f7f"/>
  
  <!-- Left ear -->
  <polygon points="65,35 50,10 60,50" fill="#ff9f7f"/>
  <polygon points="62,40 55,25 62,48" fill="#ffb3a0"/>
  
  <!-- Right ear -->
  <polygon points="135,35 150,10 140,50" fill="#ff9f7f"/>
  <polygon points="138,40 145,25 138,48" fill="#ffb3a0"/>
  
  <!-- Eyes -->
  <circle cx="80" cy="75" r="8" fill="#333"/>
  <circle cx="120" cy="75" r="8" fill="#333"/>
  <circle cx="82" cy="73" r="3" fill="#fff"/>
  <circle cx="122" cy="73" r="3" fill="#fff"/>
  
  <!-- Nose -->
  <path d="M 100 95 L 98 105 L 102 105 Z" fill="#ff6b9d"/>
  
  <!-- Mouth -->
  <path d="M 100 105 Q 90 115 85 110" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 105 Q 110 115 115 110" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Whiskers -->
  <line x1="50" y1="85" x2="25" y2="80" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="95" x2="25" y2="100" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="150" y1="85" x2="175" y2="80" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="150" y1="95" x2="175" y2="100" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="145" rx="35" ry="40" fill="#ff9f7f"/>
  
  <!-- Front paws -->
  <rect x="75" y="175" width="12" height="18" rx="6" fill="#ff9f7f"/>
  <rect x="113" y="175" width="12" height="18" rx="6" fill="#ff9f7f"/>
  
  <!-- Tail -->
  <path d="M 135 135 Q 160 130 155 100" stroke="#ff9f7f" stroke-width="18" fill="none" stroke-linecap="round"/>
</svg>